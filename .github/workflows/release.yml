name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install aarch64 linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - run: cargo build --release --target ${{ matrix.target }} -p vaultship-cli
      - name: Package artifact (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/vaultship dist/
          tar -czf vaultship-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist vaultship
      - name: Package artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/vaultship.exe" "dist/vaultship.exe"
          Compress-Archive -Path "dist/vaultship.exe" -DestinationPath "vaultship-${{ github.ref_name }}-${{ matrix.target }}.zip"
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vaultship-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  docker:
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_USERNAME || 'cyberxdefend' }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.io/cyberxdefend/vaultship:${{ github.ref_name }}
            docker.io/cyberxdefend/vaultship:latest
            ghcr.io/cyberxdefend/vaultship:${{ github.ref_name }}
            ghcr.io/cyberxdefend/vaultship:latest

  publish-crates:
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          publish_crate() {
            local crate="$1"
            if cargo publish -p "$crate"; then
              return 0
            fi
            if cargo publish -p "$crate" --dry-run >/dev/null 2>&1; then
              echo "crate already published, continuing: $crate"
              return 0
            fi
            echo "crate publish failed: $crate"
            return 1
          }

          publish_crate vaultship-harden
          publish_crate vaultship-encrypt
          publish_crate vaultship-sign
          publish_crate vaultship-license
          publish_crate vaultship-sdk
          publish_crate vaultship-cli

  github-release:
    needs: [binaries, docker, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate checksums
        run: |
          shopt -s globstar
          sha256sum **/*.tar.gz **/*.zip > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/*.tar.gz
            **/*.zip
            checksums.txt

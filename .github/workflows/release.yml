name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install aarch64 linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build binary (default linker)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p vaultship-cli
      - name: Build binary (aarch64 linux linker)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p vaultship-cli
      - name: Package artifact (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/vaultship dist/
          tar -czf vaultship-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist vaultship
      - name: Package artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/vaultship.exe" "dist/vaultship.exe"
          Compress-Archive -Path "dist/vaultship.exe" -DestinationPath "vaultship-${{ github.ref_name }}-${{ matrix.target }}.zip"
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vaultship-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  docker:
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_USERNAME || 'cyberxdefend' }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.io/cyberxdefend/vaultship:${{ github.ref_name }}
            docker.io/cyberxdefend/vaultship:latest
            ghcr.io/cyberxdefend/vaultship:${{ github.ref_name }}
            ghcr.io/cyberxdefend/vaultship:latest

  publish-crates:
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          publish_crate() {
            local crate="$1"
            if cargo publish -p "$crate"; then
              return 0
            fi
            if cargo publish -p "$crate" --dry-run >/dev/null 2>&1; then
              echo "crate already published, continuing: $crate"
              return 0
            fi
            echo "crate publish failed: $crate"
            return 1
          }

          publish_crate vaultship-harden
          publish_crate vaultship-encrypt
          publish_crate vaultship-sign
          publish_crate vaultship-license
          publish_crate vaultship-sdk
          publish_crate vaultship-cli

  github-release:
    # Publish GitHub release as soon as binaries are ready so packaging
    # jobs can start downloading the release assets immediately.
    needs: [binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate checksums
        run: |
          shopt -s globstar
          sha256sum **/*.tar.gz **/*.zip > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/*.tar.gz
            **/*.zip
            checksums.txt

  linux-packages:
    needs: [github-release]
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.38.0/nfpm_2.38.0_Linux_x86_64.tar.gz \
            | tar -xz nfpm
          sudo mv nfpm /usr/local/bin/nfpm
      - name: Build amd64 packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_CLEAN="${VERSION#v}"
          curl -sfL "https://github.com/cyberxdefend/vaultship/releases/download/${VERSION}/vaultship-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          chmod +x vaultship
          ARCH=amd64 VERSION="${VERSION_CLEAN}" envsubst < packaging/nfpm.yaml > /tmp/nfpm.yaml
          nfpm package --config /tmp/nfpm.yaml --packager deb \
            --target "vaultship-${VERSION}-amd64.deb"
          nfpm package --config /tmp/nfpm.yaml --packager rpm \
            --target "vaultship-${VERSION}-x86_64.rpm"
      - name: Build arm64 packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_CLEAN="${VERSION#v}"
          rm -f vaultship
          curl -sfL "https://github.com/cyberxdefend/vaultship/releases/download/${VERSION}/vaultship-${VERSION}-aarch64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          chmod +x vaultship
          ARCH=arm64 VERSION="${VERSION_CLEAN}" envsubst < packaging/nfpm.yaml > /tmp/nfpm.yaml
          nfpm package --config /tmp/nfpm.yaml --packager deb \
            --target "vaultship-${VERSION}-arm64.deb"
          nfpm package --config /tmp/nfpm.yaml --packager rpm \
            --target "vaultship-${VERSION}-aarch64.rpm"
      - name: Upload .deb and .rpm to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.rpm

  homebrew-tap:
    needs: [github-release]
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: vaultship
          formula-path: Formula/vaultship.rb
          homebrew-tap: cyberxdefend/homebrew-vaultship
          base-branch: main
          tag-name: ${{ github.ref_name }}
          create-pullrequest: false
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  snap:
    needs: [github-release]
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update version and source URL in snapcraft.yaml
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_CLEAN="${VERSION#v}"
          sed -i "s/^version: .*/version: \"${VERSION_CLEAN}\"/" packaging/snap/snapcraft.yaml
          sed -i "s|releases/download/v[^/]*/vaultship-v[^-]*-|releases/download/${VERSION}/vaultship-${VERSION}-|g" \
            packaging/snap/snapcraft.yaml
      - uses: snapcore/action-build@v1
        id: build
        with:
          path: packaging/snap
      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable

  aur:
    needs: [github-release]
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update PKGBUILD with version and real checksums
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_CLEAN="${VERSION#v}"
          X86_URL="https://github.com/cyberxdefend/vaultship/releases/download/${VERSION}/vaultship-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          AARCH64_URL="https://github.com/cyberxdefend/vaultship/releases/download/${VERSION}/vaultship-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
          X86_SHA=$(curl -sL "${X86_URL}" | sha256sum | awk '{print $1}')
          AARCH64_SHA=$(curl -sL "${AARCH64_URL}" | sha256sum | awk '{print $1}')
          sed -i "s/^pkgver=.*/pkgver=${VERSION_CLEAN}/" packaging/aur/PKGBUILD
          sed -i "s/SHA256_X86_64_PLACEHOLDER/${X86_SHA}/" packaging/aur/PKGBUILD
          sed -i "s/SHA256_AARCH64_PLACEHOLDER/${AARCH64_SHA}/" packaging/aur/PKGBUILD
      - uses: KSXGitHub/github-actions-deploy-aur@v2.7.0
        with:
          pkgname: vaultship-bin
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: vaultship-release-bot
          commit_email: releases@cyberxdefend.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "upgpkg: vaultship-bin ${{ github.ref_name }}"

  chocolatey:
    needs: [github-release]
    environment: prod
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute SHA256 and update files
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $ver = $env:VERSION.TrimStart('v')
          $zipUrl = "https://github.com/cyberxdefend/vaultship/releases/download/$env:VERSION/vaultship-$env:VERSION-x86_64-pc-windows-msvc.zip"
          $tmp = New-TemporaryFile
          Invoke-WebRequest -Uri $zipUrl -OutFile $tmp.FullName
          $sha = (Get-FileHash $tmp.FullName -Algorithm SHA256).Hash.ToLower()
          Remove-Item $tmp.FullName

          (Get-Content packaging/chocolatey/vaultship.nuspec) `
            -replace '<version>.*</version>', "<version>$ver</version>" |
            Set-Content packaging/chocolatey/vaultship.nuspec

          (Get-Content packaging/chocolatey/tools/chocolateyInstall.ps1) `
            -replace 'VERSION_PLACEHOLDER', $env:VERSION `
            -replace 'SHA256_PLACEHOLDER', $sha |
            Set-Content packaging/chocolatey/tools/chocolateyInstall.ps1
      - name: Pack and push to Chocolatey
        shell: pwsh
        working-directory: packaging/chocolatey
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          choco pack vaultship.nuspec
          $nupkg = (Get-Item *.nupkg).Name
          choco push $nupkg --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY

  winget:
    needs: [github-release]
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: cyberxdefend.VaultShip
          version: ${{ github.ref_name }}
          installers-regex: 'x86_64-pc-windows-msvc\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

  scoop:
    needs: [github-release]
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: cyberxdefend/scoop-vaultship
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: scoop-bucket
      - name: Update Scoop manifest
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_CLEAN="${VERSION#v}"
          ZIP_URL="https://github.com/cyberxdefend/vaultship/releases/download/${VERSION}/vaultship-${VERSION}-x86_64-pc-windows-msvc.zip"
          SHA256=$(curl -sL "${ZIP_URL}" | sha256sum | awk '{print $1}')
          jq --arg v "$VERSION_CLEAN" \
             --arg url "$ZIP_URL" \
             --arg hash "sha256:${SHA256}" \
             '.version = $v | .url = $url | .hash = $hash' \
             scoop-bucket/vaultship.json > /tmp/vaultship.json
          mv /tmp/vaultship.json scoop-bucket/vaultship.json
      - name: Commit and push
        working-directory: scoop-bucket
        run: |
          git config user.name "vaultship-release-bot"
          git config user.email "releases@cyberxdefend.com"
          git add vaultship.json
          git commit -m "Update to ${{ github.ref_name }}"
          git push
